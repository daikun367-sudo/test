<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理科・社会 問題集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#07070e,#0d0f1c 60%,#060c14);font-family:'Hiragino Kaku Gothic ProN',sans-serif;color:#e8e8f0}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(100,120,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(100,120,255,.035) 1px,transparent 1px);background-size:40px 40px}
.wrap{max-width:640px;margin:0 auto;padding:16px 14px}
.hd{text-align:center;margin-bottom:14px}
.hd-sub{font-size:.68rem;letter-spacing:.24em;color:#6478ff;text-transform:uppercase;margin-bottom:4px}
.hd-title{font-size:1.45rem;font-weight:900;background:linear-gradient(90deg,#8fa8ff,#c8a8ff,#80ffb0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tab-row{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:10px 0;border-radius:10px;border:none;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .16s}
.tab.active-sci{background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff;box-shadow:0 4px 14px rgba(39,174,96,.4)}
.tab.active-geo{background:linear-gradient(135deg,#e67e22,#ca6f1e);color:#fff;box-shadow:0 4px 14px rgba(230,126,34,.4)}
.tab.active-his{background:linear-gradient(135deg,#c0392b,#a93226);color:#fff;box-shadow:0 4px 14px rgba(192,57,43,.4)}
.tab.inactive{background:rgba(30,30,50,.6);border:1px solid #334;color:#778}
.tab.active-geo{background:linear-gradient(135deg,#2471a3,#1a5276);color:#fff;box-shadow:0 4px 14px rgba(36,113,163,.4)}
.tab.active-his{background:linear-gradient(135deg,#c0392b,#922b21);color:#fff;box-shadow:0 4px 14px rgba(192,57,43,.4)}
.badge{display:inline-block;border-radius:20px;padding:2px 12px;font-size:.76rem}
.badges{margin-top:8px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.card{background:linear-gradient(135deg,rgba(16,16,32,.95),rgba(22,22,44,.9));border-radius:13px;padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:transform .16s,filter .16s;border-left:4px solid}
.card:hover{transform:translateY(-2px) scale(1.013);filter:brightness(1.1)}
.choice{border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:.9rem;margin-bottom:8px;cursor:pointer;transition:all .12s;border:1px solid #252545;background:rgba(18,20,44,.85);color:#ccd}
.choice:hover{filter:brightness(1.12);transform:translateX(3px)}
.choice.answered{cursor:default;transform:none}
.prog{height:4px;background:#1a1a35;border-radius:4px;margin-bottom:14px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;transition:width .4s}
.qbox{background:linear-gradient(135deg,rgba(18,20,44,.97),rgba(22,25,52,.9));border-radius:16px;padding:18px 16px;margin-bottom:14px;line-height:1.85}
.result-banner{border-radius:12px;padding:12px 15px;margin-bottom:11px}
.fill-input{width:100%;padding:13px 16px;border-radius:12px;background:rgba(10,12,28,.9);color:#e8e8f0;font-size:1rem;outline:none;margin-bottom:12px;transition:border .2s}
.btn{padding:13px;border-radius:12px;border:none;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;transition:filter .14s;width:100%}
.btn:hover{filter:brightness(1.15)}
.btn-back{background:rgba(100,120,255,.1);border:1px solid #334;border-radius:8px;color:#778;padding:4px 11px;font-size:.74rem;cursor:pointer}
.btn-back:hover{filter:brightness(1.2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .4s ease}
</style>
</head>
<body>
<div class="grid"></div>
<div class="wrap" id="app"></div>
<script>
// ═══════════════════════════════════════════════
// 理科 問題データ
// ═══════════════════════════════════════════════
const SCI_UNITS = [
  {id:"s1",label:"1章 物質のなり立ち",icon:"⚗️",color:"#27ae60",qs:[
    {type:"select",q:"もとの物質とちがう物質ができる変化を何というか。",choices:["化学変化","物理変化","状態変化","電気分解"],a:"化学変化",exp:"化学反応ともいう。化学変化では新しい物質ができる。"},
    {type:"select",q:"1種類の物質が2種類以上の物質に分かれる化学変化を何というか。",choices:["分解","化合","酸化","還元"],a:"分解",exp:"例：炭酸水素ナトリウムを加熱すると炭酸ナトリウム・水・二酸化炭素に分解する。"},
    {type:"select",q:"物質に熱を加えて分解することを何というか。",choices:["熱分解","電気分解","酸化","化合"],a:"熱分解",exp:"炭酸水素ナトリウムの加熱分解が代表例。"},
    {type:"select",q:"物質に電流を流して分解することを何というか。",choices:["電気分解","熱分解","分解","イオン化"],a:"電気分解",exp:"水に水酸化ナトリウムを加えて電流を流すと、水素と酸素に分解される。"},
    {type:"fill",q:"物質をつくっている粒子で、それ以上分割することができない粒子を【　】という。",a:"原子",exp:"原子の種類を元素という。"},
    {type:"fill",q:"原子の種類のことを【　】という。",a:"元素",exp:"元素を1〜2文字のアルファベットで表したものが元素記号。"},
    {type:"fill",q:"元素を表す1文字または2文字のアルファベットからなる記号を【　】という。",a:"元素記号",exp:"例：水素H、酸素O、炭素C、銅Cu、鉄Feなど。"},
    {type:"select",q:"原子を原子番号の順に並べ、性質をもとに元素を整理した表を何というか。",choices:["元素の周期表","分子モデル","化学反応式","物質一覧表"],a:"元素の周期表",exp:"縦の列を族、横の行を周期という。"},
    {type:"fill",q:"いくつかの原子が結びついてできた、物質の性質を示す最小単位の粒子を【　】という。",a:"分子",exp:"例：水分子H₂O、酸素分子O₂など。"},
    {type:"fill",q:"元素記号を用いて物質を表したものを【　】という。",a:"化学式",exp:"例：水はH₂O、二酸化炭素はCO₂。"},
    {type:"select",q:"1種類の元素だけでできている物質を何というか。",choices:["単体","化合物","混合物","元素"],a:"単体",exp:"例：酸素O₂、銅Cu、鉄Feなど。"},
    {type:"select",q:"2種類以上の元素からできている物質を何というか。",choices:["化合物","単体","混合物","分子"],a:"化合物",exp:"例：水H₂O、塩化ナトリウムNaCl、二酸化炭素CO₂など。"},
    {type:"select",q:"2種類以上の物質が混じり合っているものを何というか。",choices:["混合物","化合物","単体","合金"],a:"混合物",exp:"例：空気、食塩水など。"},
    {type:"fill",q:"炭酸水素ナトリウムを加熱すると発生する、石灰水を白くにごらせる気体は【　】である。",a:"二酸化炭素",exp:"化学式はCO₂。"},
    {type:"fill",q:"炭酸水素ナトリウムを加熱すると生じる、青色の塩化コバルト紙を桃色に変える液体は【　】である。",a:"水",exp:"化学式はH₂O。塩化コバルト紙が青→桃色に変化することで確認できる。"},
  ]},
  {id:"s2",label:"2章 物質どうしの化学変化",icon:"🔬",color:"#2471a3",qs:[
    {type:"fill",q:"化学式を組み合わせて化学変化を表した式を【　】という。",a:"化学反応式",exp:"例：2H₂+O₂→2H₂O"},
    {type:"fill",q:"鉄と硫黄が結びついてできた黒色の物質を【　】という。",a:"硫化鉄",exp:"化学式はFeS。磁石につかず、塩酸を加えると硫化水素が発生する。"},
    {type:"select",q:"鉄と硫黄の反応後にできた物質に塩酸を加えたとき発生する、腐卵臭のある気体は何か。",choices:["硫化水素","水素","二酸化硫黄","塩素"],a:"硫化水素",exp:"化学式はH₂S。腐卵臭が特徴。"},
    {type:"select",q:"鉄と硫黄の混合物（反応前）に塩酸を加えたとき発生する気体は何か。",choices:["水素","硫化水素","酸素","二酸化炭素"],a:"水素",exp:"反応前の混合物には鉄が含まれており、塩酸と反応して水素H₂が発生する。"},
    {type:"fill",q:"鉄と硫黄の反応を化学反応式で表すと「Fe＋S→【　】」となる。",a:"FeS",exp:"鉄（Fe）と硫黄（S）が結びついて硫化鉄（FeS）ができる。"},
  ]},
  {id:"s3",label:"3章 酸素がかかわる化学変化",icon:"🔥",color:"#c0392b",qs:[
    {type:"fill",q:"物質が酸素と結びつくことを【　】という。",a:"酸化",exp:"酸化によってできる物質を酸化物という。"},
    {type:"fill",q:"酸化によってできる物質を【　】という。",a:"酸化物",exp:"例：酸化銅CuO、酸化マグネシウムMgOなど。"},
    {type:"fill",q:"物質が熱や光を出しながら激しく酸化されることを【　】という。",a:"燃焼",exp:"スチールウールやマグネシウムの燃焼が例。"},
    {type:"fill",q:"酸化物から酸素がうばわれる化学変化を【　】という。",a:"還元",exp:"酸化と還元は同時に起こる。"},
    {type:"select",q:"銅板を空気中で加熱したとき、表面にできる黒色の物質は何か。",choices:["酸化銅","硫化銅","炭素","酸化マグネシウム"],a:"酸化銅",exp:"銅（Cu）が酸素と結びついて酸化銅（CuO）ができる。"},
    {type:"fill",q:"銅を加熱して酸化銅ができるときの化学反応式は「2Cu＋O₂→【　】」である。",a:"2CuO",exp:"銅2個と酸素分子1個が反応して酸化銅が2個できる。"},
    {type:"fill",q:"マグネシウムを加熱したときの化学反応式は「2Mg＋O₂→【　】」である。",a:"2MgO",exp:"酸化マグネシウム（MgO）は白色の物質。"},
    {type:"fill",q:"水素と酸素が反応して水ができるときの化学反応式は「2H₂＋O₂→【　】」である。",a:"2H₂O",exp:"水素と酸素が結びついて水ができる。"},
    {type:"select",q:"木片を燃やしたあと、石灰水が白くにごったことからわかることは何か。",choices:["二酸化炭素ができた","水素ができた","酸素ができた","窒素ができた"],a:"二酸化炭素ができた",exp:"石灰水が白くにごる→二酸化炭素が発生。木片には炭素原子がふくまれている。"},
    {type:"select",q:"酸化銅と炭素の反応で、酸化銅が酸素をうばわれて銅になる変化を何というか。",choices:["還元","酸化","化合","分解"],a:"還元",exp:"2CuO＋C→2Cu＋CO₂。酸化銅は還元され、炭素は酸化される。"},
    {type:"fill",q:"製鉄所で、酸化鉄にコークス（炭素）を加えて加熱すると、酸化鉄が【　】されて鉄がとり出される。",a:"還元",exp:"酸化鉄（Fe₂O₃）が還元されて鉄（Fe）になる。"},
  ]},
  {id:"s4",label:"4章 化学変化と質量の変化",icon:"⚖️",color:"#8e44ad",qs:[
    {type:"fill",q:"化学変化の前後で物質全体の質量は変化しない。この法則を【　】という。",a:"質量保存の法則",exp:"化学変化だけでなく物理変化にも成り立つ法則。"},
    {type:"select",q:"質量保存の法則が成り立つ理由として正しいのはどれか。",choices:["化学変化の前後で原子の種類と数が変わらないから","分子の数が変わらないから","体積が変わらないから","熱が発生しないから"],a:"化学変化の前後で原子の種類と数が変わらないから",exp:"原子は化学変化で新たにできたり、なくなったりしないため、質量の合計は変わらない。"},
    {type:"select",q:"炭酸水素ナトリウムと塩酸を密閉容器で反応させたあと、ふたをあけると質量はどうなるか。",choices:["減る","ふえる","変わらない","2倍になる"],a:"減る",exp:"反応で発生したCO₂が空気中に逃げるため、質量が減る。"},
    {type:"select",q:"化学変化の前後で変化しないものはどれか。",choices:["各原子の数","分子の数","物質の種類","物質の状態"],a:"各原子の数",exp:"原子の種類と数は変わらない。これが質量保存の法則の根拠。"},

// ═══════════════════════════════════════════════
// 社会 問題データ
// ═══════════════════════════════════════════════
const GEO_UNITS = [
  {id:"soc1",label:"5章 産業の特色①（農林水産業）",icon:"🌾",color:"#e67e22",qs:[

    {type:"fill",q:"大都市の近くで、野菜や花などを大消費地向けに栽培する農業を【　】という。",a:"近郊農業",exp:"新鮮な野菜を素早く大都市に届けられる利点がある。"},
    {type:"fill",q:"農作物の成長を速めて出荷時期を早める栽培方法を【　】という。",a:"促成栽培",exp:"高知平野や宮崎平野でビニールハウスを使った促成栽培が盛ん。"},
    {type:"fill",q:"農作物の成長を遅らせて出荷時期をずらす栽培方法を【　】という。",a:"抑制栽培",exp:"高原の涼しい気候を利用して夏に野菜を出荷するなど。"},
    {type:"select",q:"九州地方や北海道で特に盛んな農業で、肉牛などを育てる農業を何というか。",choices:["畜産","促成栽培","近郊農業","二毛作"],a:"畜産",exp:"九州南部のシラス台地や北海道の根釧台地で畜産が盛ん。"},
    {type:"fill",q:"卵から人工的に育てた稚魚や稚貝を放流し、成長したあとにとる漁業を【　】という。",a:"栽培漁業",exp:"魚介類の資源を守りながら漁業を続けるための方法。"},
    {type:"fill",q:"魚や貝を出荷まで人工的に育てて放流せずに収穫する漁業を【　】という。",a:"養殖業",exp:"瀬戸内海や有明海などで盛ん。"},
    {type:"select",q:"日本の漁獲量が最も多い漁業はどれか。",choices:["沖合漁業","遠洋漁業","沿岸漁業","養殖業"],a:"沖合漁業",exp:"沖合漁業が漁獲量全体で最も多い。200海里問題以降、遠洋漁業は減少した。"},
    {type:"select",q:"日本の食料自給率について正しいのはどれか。",choices:["他の先進国と比べてひじょうに低い","他の先進国と同じくらいである","他の先進国と比べて高い","穀物の自給率は100%に近い"],a:"他の先進国と比べてひじょうに低い",exp:"日本の食料自給率（カロリーベース）は約38%（2022年）で、先進国の中で最低水準。"},
  ]},
  {id:"soc2",label:"5章 産業の特色②（工業）",icon:"🏭",color:"#8e44ad",qs:[
    {type:"select",q:"繊維や食料品など、おもに日常生活で使う軽い製品をつくる工業を何というか。",choices:["軽工業","重化学工業","先端技術産業","機械工業"],a:"軽工業",exp:"かつての日本の工業は繊維工業などの軽工業から始まった。"},
    {type:"fill",q:"金属工業・機械工業・化学工業を合わせて【　】という。",a:"重化学工業",exp:"高度経済成長期に日本の工業の中心となった。"},

    {type:"fill",q:"大阪・兵庫に広がる工業地帯を【　】という。",a:"阪神工業地帯",exp:"化学工業や金属工業が盛ん。"},

  {id:"soc3",label:"5章 産業の特色③（商業・サービス業）",icon:"🛒",color:"#16a085",qs:[

    {type:"fill",q:"インターネットで商品やサービスを売買することを【　】という。",a:"電子商取引",exp:"ECともいう。近年急速に普及している。"},
    {type:"fill",q:"情報通信に関連する業種が成長し、情報社会となることを【　】化という。",a:"ICT",exp:"ICT（情報通信技術）の発達により産業や社会が変化している。"},
  ]},
  {id:"soc4",label:"6章 交通網・通信網・地域区分①",icon:"🚄",color:"#c0392b",qs:[

// ユーティリティ
// ═══════════════════════════════════════════════
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function makeChoices(q){return shuffle([...q.choices]);}

// ═══════════════════════════════════════════════
// 状態
// ═══════════════════════════════════════════════
let S={
  tab:"sci",
  screen:"home",
  unit:null, deck:[], idx:0,
  choices:[], sel:null, fillVal:"", fillOk:null,
  score:{ok:0,ng:0},
  wrongList:[],     // 間違えた問題
  cleared:{}        // クリア済み単元ID: {unitId: true}
};
function set(patch){Object.assign(S,patch);render();}

function startUnit(unit, mode){
  const qs = mode==="wrong" ? S.wrongList : shuffle(unit.qs);
  const deck = mode==="wrong" ? qs : qs;
  const choices=deck[0].type==="select"?makeChoices(deck[0]):[];
  const wl = mode==="wrong" ? [] : [];
  set({screen:"study",unit,deck,idx:0,choices,sel:null,fillVal:"",fillOk:null,score:{ok:0,ng:0},wrongList:wl});
}
function goNext(){
  const n=S.idx+1;
  if(n>=S.deck.length){set({screen:"result"});return;}
  const choices=S.deck[n].type==="select"?makeChoices(S.deck[n]):[];
  set({idx:n,choices,sel:null,fillVal:"",fillOk:null});
}
function pickSel(c){
  if(S.sel!==null)return;
  const ok=c===S.deck[S.idx].a;
  const wl=ok?S.wrongList:[...S.wrongList,S.deck[S.idx]];
  set({sel:c,score:{ok:S.score.ok+(ok?1:0),ng:S.score.ng+(ok?0:1)},wrongList:wl});
}
function checkFill(){
  const ans=S.deck[S.idx].a;
  const ok=S.fillVal.trim()===ans||S.fillVal.trim().replace(/\s/g,"")===ans.replace(/\s/g,"");
  const wl=ok?S.wrongList:[...S.wrongList,S.deck[S.idx]];
  set({fillOk:ok,score:{ok:S.score.ok+(ok?1:0),ng:S.score.ng+(ok?0:1)},wrongList:wl});
}

// ═══════════════════════════════════════════════
// DOM helpers
// ═══════════════════════════════════════════════
function el(tag,attrs,kids){
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="onClick")e.addEventListener("click",v);
    else if(k==="onInput")e.addEventListener("input",v);
    else if(k==="onKeydown")e.addEventListener("keydown",v);
    else if(k==="disabled"){if(v)e.disabled=true;}
    else if(k==="placeholder")e.placeholder=v;
    else if(k==="value")e.value=v;
    else if(k==="type")e.type=v;
    else if(k==="className")e.className=v;
    else e[k]=v;
  }
  for(const c of(kids||[])){
    if(c==null)continue;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return e;
}
const D=(a,k)=>el("div",a,k);
const P=(a,k)=>el("p",a,k);
const B=(a,k)=>el("button",a,k);
const Sp=(a,k)=>el("span",a,k);
const H1=(a,k)=>el("h1",a,k);
const H2=(a,k)=>el("h2",a,k);

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const {tab,screen,unit,deck,idx,choices,sel,fillVal,fillOk,score}=S;
  const uc=unit?unit.color:(tab==="sci"?"#27ae60":tab==="geo"?"#2471a3":"#c0392b");
  const total=deck.length;
  const currentUnits=tab==="sci"?SCI_UNITS:tab==="geo"?GEO_UNITS:HIS_UNITS;

  // ── ヘッダー ──
  app.appendChild(D({className:"hd fade"},[
    D({className:"hd-sub"},["QUIZ APP"]),
    H1({className:"hd-title"},["理科・社会 問題集"]),
    screen==="study"?D({className:"badges"},[
      Sp({className:"badge",style:{background:"rgba(100,120,255,.15)",border:"1px solid rgba(100,120,255,.3)"}},[`${idx+1}/${total}`]),
      Sp({className:"badge",style:{background:"rgba(39,174,96,.15)",border:"1px solid #27ae6055",color:"#7ef0a8"}},[`✅${score.ok}`]),
      Sp({className:"badge",style:{background:"rgba(192,57,43,.15)",border:"1px solid #c0392b55",color:"#f08080"}},[`❌${score.ng}`]),

  ]));

  const tabRow=D({className:"tab-row"},[

    B({className:"tab "+(tab==="geo"?"active-geo":"inactive"),onClick:()=>set({tab:"geo",screen:"home",unit:null})},["🌏 地理"]),
    B({className:"tab "+(tab==="his"?"active-his":"inactive"),onClick:()=>set({tab:"his",screen:"home",unit:null})},["📜 歴史"]),
  ]);
  app.appendChild(tabRow);

  // ── HOME ──
  if(screen==="home"){
    const home=D({className:"fade"},[
      P({style:{textAlign:"center",color:"#778",fontSize:".85rem",marginBottom:"16px"}},["単元を選んでください"]),
    ]);
    currentUnits.forEach(u=>{
      const isCleared=S.cleared[u.id]===true;
      home.appendChild(D({className:"card",style:{borderColor:u.color,opacity:1},onClick:()=>startUnit(u)},[
        D({style:{display:"flex",alignItems:"center",gap:"12px"}},[
          Sp({style:{fontSize:"1.5rem"}},[u.icon]),
          D({},[
            D({style:{fontWeight:700,fontSize:".93rem",display:"flex",alignItems:"center",gap:"6px"}},[
              u.label,
              isCleared?Sp({style:{fontSize:".8rem",color:"#7ef0a8",background:"rgba(39,174,96,.2)",border:"1px solid #27ae6055",borderRadius:"20px",padding:"1px 8px"}},["✅ クリア"]):null,
            ]),
            D({style:{fontSize:".7rem",color:"#556",marginTop:"2px"}},[`全${u.qs.length}問`]),
          ]),
          Sp({style:{marginLeft:"auto",color:u.color,fontSize:"1.2rem"}},["▶"]),
        ]),
      ]));
    });
    // 全問ミックス
    const allQs=shuffle(currentUnits.flatMap(u=>u.qs));
    const allUnit={id:"all",label:"全単元ミックス",icon:"🎯",color:tab==="sci"?"#27ae60":tab==="geo"?"#2471a3":"#c0392b",qs:allQs};
    home.appendChild(D({className:"card",style:{borderColor:tab==="sci"?"#27ae60":tab==="geo"?"#e67e22":"#c0392b",background:"linear-gradient(135deg,rgba(20,20,40,.95),rgba(26,28,52,.9))"},onClick:()=>startUnit(allUnit)},[
      D({style:{display:"flex",alignItems:"center",gap:"12px"}},[
        Sp({style:{fontSize:"1.5rem"}},["🎯"]),
        D({},[
          D({style:{fontWeight:700,fontSize:".93rem"}},["全単元ミックス"]),
          D({style:{fontSize:".7rem",color:"#778",marginTop:"2px"}},[`全${allQs.length}問 シャッフル`]),
        ]),
        Sp({style:{marginLeft:"auto",color:tab==="sci"?"#27ae60":tab==="geo"?"#2471a3":"#c0392b",fontSize:"1.2rem"}},["▶"]),
      ]),
    ]));
    app.appendChild(home);
    return;
  }

  // ── STUDY ──
  if(screen==="study"&&idx<deck.length){
    const q=deck[idx];
    const sec=D({className:"fade"},[]);

    // topbar
    sec.appendChild(D({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}},[
      Sp({style:{fontSize:".9rem"}},[unit.icon]),
      Sp({style:{fontSize:".75rem",color:uc,fontWeight:600}},[unit.label]),
      Sp({style:{fontSize:".68rem",background:q.type==="select"?"rgba(36,113,163,.2)":"rgba(230,126,34,.2)",border:`1px solid ${q.type==="select"?"#2471a3":"#e67e22"}55`,color:q.type==="select"?"#7ab8ff":"#ffb87a",borderRadius:"6px",padding:"2px 8px",marginLeft:"4px"}},[q.type==="select"?"🔘 選択":"✏️ 穴埋め"]),
      B({className:"btn-back",onClick:()=>set({screen:"home"})},["← 単元選択"]),
    ]));

    // progress
    sec.appendChild(D({className:"prog"},[D({className:"prog-bar",style:{width:`${idx/total*100}%`,background:`linear-gradient(90deg,${uc},${uc}88)`}})]));

    // 問題文
    const qText=q.q.replace(/【　】/g,"＿＿＿");
    sec.appendChild(D({className:"qbox",style:{border:`1px solid ${uc}33`}},[
      D({style:{fontSize:".68rem",color:"#445",marginBottom:"6px"}},[`Q${idx+1}. ${q.type==="select"?"選択問題":"穴埋め問題"}`]),
      P({style:{margin:0,fontSize:".93rem",lineHeight:1.85,color:"#c8cce0"}},[qText]),
    ]));

    // 選択問題
    if(q.type==="select"){
      choices.forEach((c,i)=>{
        const answered=sel!==null;
        const isRight=c===q.a,picked=sel===c;
        let bg="rgba(18,20,44,.85)",bd="1px solid #252545",cl="#ccd",op=1;
        if(answered){
          if(isRight){bg="rgba(39,174,96,.18)";bd="1px solid #27ae6077";cl="#7ef0a8";}
          else if(picked){bg="rgba(192,57,43,.18)";bd="1px solid #c0392b77";cl="#f08080";}
          else op=0.38;
        }
        const lbl=answered?(isRight?"○":picked?"✕":""):["A","B","C","D"][i];
        const lblBg=answered?(isRight?"#27ae60":picked?"#c0392b":"#1a1a35"):"#1a1a35";
        sec.appendChild(D({className:"choice"+(answered?" answered":""),style:{background:bg,border:bd,color:cl,opacity:op},onClick:answered?null:()=>pickSel(c)},[

          c,

      if(sel!==null){
        const ok=sel===q.a;
        sec.appendChild(D({className:"result-banner",style:{background:ok?"rgba(39,174,96,.11)":"rgba(192,57,43,.11)",border:`1px solid ${ok?"#27ae60":"#c0392b"}55`,marginTop:"4px"}},[

      }
    }

    // 穴埋め問題
    if(q.type==="fill"){
      const bd2=fillOk===null?"rgba(100,120,255,.3)":fillOk?"#27ae60":"#c0392b";
      const inp=el("input",{type:"text",placeholder:"答えを入力してEnterまたは確認",disabled:fillOk!==null,value:fillVal,
        className:"fill-input",
        style:{border:`2px solid ${bd2}`},
        onInput:e=>{S.fillVal=e.target.value;},
        onKeydown:e=>{if(e.key==="Enter"&&fillOk===null&&S.fillVal.trim()!=="")checkFill();}
      });
      sec.appendChild(inp);
      if(fillOk===null&&fillVal.trim()!==""){
        sec.appendChild(B({className:"btn",style:{background:`linear-gradient(135deg,${uc},${uc}bb)`,marginBottom:"8px"},onClick:checkFill},["確認する ✅"]));
      }
      if(fillOk!==null){
        sec.appendChild(D({className:"result-banner",style:{background:fillOk?"rgba(39,174,96,.11)":"rgba(192,57,43,.11)",border:`1px solid ${fillOk?"#27ae60":"#c0392b"}55`}},[
          D({style:{fontWeight:700,fontSize:"1rem",marginBottom:"5px",color:fillOk?"#7ef0a8":"#f08080"}},[fillOk?"🎉 正解！":`😅 不正解… 正解は「${q.a}」`]),
          P({style:{margin:0,fontSize:".8rem",color:"#8a9aaa",lineHeight:1.72}},[q.exp]),
        ]));
        sec.appendChild(B({className:"btn",style:{background:`linear-gradient(135deg,${uc},${uc}bb)`,marginTop:"8px"},onClick:goNext},[idx+1>=total?"結果を見る 🏆":"次へ →"]));
      }
    }

    app.appendChild(sec);
    return;
  }

  // ── RESULT ──
  if(screen==="result"){
    const pct=Math.round(score.ok/total*100);
    const em=score.ok/total>=0.8?"🏆":score.ok/total>=0.5?"👍":"📚";
    const allCorrect=score.ok===total;
    // 全問正解なら cleared に記録
    if(allCorrect&&unit.id!=="all"){
      S.cleared={...S.cleared,[unit.id]:true};
    }
    const wl=S.wrongList;
    app.appendChild(D({className:"fade",style:{textAlign:"center",paddingTop:"20px"}},[
      D({style:{fontSize:"3.5rem",marginBottom:"10px"}},[em]),
      H2({style:{fontSize:"1.3rem",fontWeight:900,marginBottom:"5px",color:uc}},[`${unit.label} 完了！`]),
      P({style:{fontSize:"1.9rem",fontWeight:900,marginBottom:"4px"}},[`${score.ok}`,Sp({style:{fontSize:".95rem",color:"#556"}},[` / ${total} 問正解`])]),
      P({style:{color:"#778",fontSize:".85rem",marginBottom:wl.length>0?"14px":"22px"}},[`正解率 ${pct}%　${pct>=80?"すばらしい！🎉":pct>=50?"なかなか👍":"もう一度復習しよう📖"}`]),
      wl.length>0?D({style:{background:"rgba(192,57,43,.12)",border:"1px solid #c0392b44",borderRadius:12,padding:"10px 14px",marginBottom:"18px",fontSize:".85rem",color:"#f08080"}},[
        `❌ ${wl.length}問間違えました`,
      ]):P({style:{color:"#7ef0a8",fontSize:".85rem",marginBottom:"22px"}},["🎉 全問正解！完璧です！"]),
      D({style:{display:"flex",gap:"9px",justifyContent:"center",flexWrap:"wrap"}},[
        B({className:"btn",style:{background:`linear-gradient(135deg,${uc},${uc}99)`,width:"auto",padding:"11px 18px"},onClick:()=>startUnit(unit)},["もう一度"]),
        wl.length>0?B({className:"btn",style:{background:"rgba(192,57,43,.25)",border:"1px solid #c0392b55",color:"#f08080",width:"auto",padding:"11px 18px"},onClick:()=>{
          const wrongUnit={...unit,qs:wl,id:"wrong",label:"間違えた問題"};
          set({wrongList:[]});
          startUnit(wrongUnit);
        }},["❌ 間違えた問題だけ"]):null,
        B({className:"btn",style:{background:"rgba(30,30,50,.5)",border:"1px solid #334",color:"#778",width:"auto",padding:"11px 18px"},onClick:()=>set({screen:"home"})},["← 単元選択"]),
      ]),
    ]));
  }
}

render();
</script>
</body>
</html>
